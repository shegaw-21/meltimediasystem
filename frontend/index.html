<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Learning System</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="header-left">
            <h1>Multimedia Learning System</h1>
            <p>Interactive Synchronization &bull; Resource-Optimized Delivery &bull; Multi-Modal Access</p>
        </div>
        <div class="header-login" id="header-login">
            <form id="admin-login-form">
                <div class="upload-row header-row">
                    <input type="text" id="admin-username" name="username" placeholder="Username" required>
                </div>
                <div class="upload-row header-row">
                    <input type="password" id="admin-password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-download">Log In</button>
            </form>
            <div id="admin-login-status"></div>
        </div>
        <div id="header-admin-bar" style="display:none; align-items:center; gap:12px;">
            <span
                style="background:#00b4d820; color:#00b4d8; border:1px solid #00b4d840; border-radius:20px; padding:4px 12px; font-size:0.8em; font-weight:600;">&#9679;
                Admin</span>
            <a href="/admin-upload.html" class="btn-download btn-small">Upload Content</a>
            <button id="admin-logout-btn" class="btn-download btn-small" style="background:#3a3a50;">Sign Out</button>
        </div>
    </header>

    <div class="dashboard-container">
        <main class="video-section">
            <div class="video-selector">
                <label for="video-select">&#127909; Select Video:</label>
                <input type="search" id="video-search" placeholder="Search videos...">
                <select id="video-select">
                    <option value="part1">Part 1</option>
                </select>
            </div>
            <div class="video-wrapper">
                <video id="video-player" controls>
                    <source src="/api/video" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-progress">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                </div>
            </div>

            <div class="audio-section">
                <h3>&#127911; Audio Summary</h3>
                <audio id="audio-player" controls>
                    <source src="/api/audio/stream" type="audio/mpeg">
                    Your browser does not support the audio tag.
                </audio>
                <div class="audio-controls">
                    <a href="/api/audio/download" id="audio-download-link" class="btn-download">
                        &#128229; Download Audio (.MP3)
                    </a>
                </div>
            </div>
        </main>

        <aside class="transcript-section">
            <h2>Interactive Transcript</h2>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search transcript..." class="search-input">
                <button id="search-btn" class="search-btn">&#128269;</button>
            </div>
            <div id="transcript-container"></div>
            <div class="transcript-stats">
                <span id="match-count"></span>
            </div>
            <div class="transcript-downloads">
                <h3>&#128196; Download Transcript</h3>
                <div class="download-buttons">
                    <a href="/api/transcript/download/json" class="btn-download btn-small" id="download-json">
                        &#128229; JSON
                    </a>
                    <a href="/api/transcript/download/pdf" class="btn-download btn-small" id="download-pdf">
                        &#128229; PDF
                    </a>
                </div>
            </div>

            <!-- kept for app.js compatibility, hidden -->
            <div class="admin-login-section" id="admin-login-section" style="display:none;"></div>
            <div class="admin-upload-section" id="admin-upload-section" style="display:none;"></div>
        </aside>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        // Wire up the header admin bar toggle
        const _headerLogin = document.getElementById('header-login');
        const _headerAdminBar = document.getElementById('header-admin-bar');

        const _origShow = window.showAdminPanel;
        window.showAdminPanel = function (authenticated) {
            if (authenticated) {
                _headerLogin.style.display = 'none';
                _headerAdminBar.style.display = 'flex';
            } else {
                _headerLogin.style.display = '';
                _headerAdminBar.style.display = 'none';
            }
            const up = document.getElementById('admin-upload-section');
            if (up) up.style.display = authenticated ? 'block' : 'none';
        };

        document.getElementById('admin-logout-btn').addEventListener('click', async () => {
            await fetch((window.API_BASE || '') + '/api/logout', { method: 'POST', credentials: 'include' });
            window.showAdminPanel(false);
        });
    </script>
</body>

</html>
