<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Meltimedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#e0f7fc',
                            100: '#b3edf7',
                            200: '#80e2f2',
                            300: '#4dd6ec',
                            400: '#26cde8',
                            500: '#00b4d8',
                            600: '#0096c7',
                            700: '#0077b6',
                            800: '#005e8e',
                            900: '#004566',
                        },
                        surface: {
                            900: '#0f1013',
                            800: '#161620',
                            700: '#1e1e2e',
                            600: '#23232f',
                            500: '#252538',
                            400: '#2a2a40',
                            300: '#3a3a50',
                            200: '#4a4a60',
                        },
                    },
                },
            },
        }
    </script>
</head>

<body class="h-full bg-surface-700 text-slate-100 flex items-center justify-center px-4">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-brand-600 opacity-5 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-brand-700 opacity-5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md">

        <!-- Logo / brand -->
        <div class="text-center mb-8">
            <a href="/index.html"
                class="inline-flex items-center gap-2 text-brand-500 hover:text-brand-400 transition-colors mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-2xl font-bold tracking-tight">Meltimedia</span>
            </a>
            <h1 class="text-3xl font-bold text-slate-50">Admin Login</h1>
            <p class="mt-1 text-slate-400 text-sm">Sign in to access the content management panel.</p>
        </div>

        <!-- Card -->
        <div class="bg-surface-600 border border-white/5 rounded-2xl shadow-2xl p-8">

            <form id="admin-login-form" novalidate>

                <!-- Username -->
                <div class="mb-5">
                    <label for="admin-username" class="block text-sm font-medium text-slate-300 mb-1.5">
                        Username
                    </label>
                    <div class="relative">
                        <span
                            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </span>
                        <input type="text" id="admin-username" name="username" placeholder="admin"
                            autocomplete="username" required class="w-full bg-surface-800 border border-surface-300 text-slate-100 placeholder-slate-500
                                   rounded-lg pl-10 pr-4 py-2.5 text-sm
                                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                                   transition-colors">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label for="admin-password" class="block text-sm font-medium text-slate-300 mb-1.5">
                        Password
                    </label>
                    <div class="relative">
                        <span
                            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input type="password" id="admin-password" name="password" placeholder="••••••••"
                            autocomplete="current-password" required class="w-full bg-surface-800 border border-surface-300 text-slate-100 placeholder-slate-500
                                   rounded-lg pl-10 pr-10 py-2.5 text-sm
                                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                                   transition-colors">
                        <!-- Toggle password visibility -->
                        <button type="button" id="toggle-password" aria-label="Toggle password visibility"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 transition-colors">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                                       -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Status message -->
                <div id="login-status" role="alert" aria-live="polite"
                    class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

                <!-- Submit button -->
                <button type="submit" id="login-btn" class="w-full bg-brand-500 hover:bg-brand-600 active:bg-brand-700
                           text-white font-semibold rounded-lg px-4 py-2.5
                           transition-colors focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2 focus:ring-offset-surface-600
                           flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                    <span id="login-btn-text">Sign In</span>
                    <svg id="login-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                    </svg>
                </button>

            </form>
        </div>

        <!-- Back to main app -->
        <p class="text-center mt-6 text-sm text-slate-500">
            Not an admin?
            <a href="/index.html" class="text-brand-500 hover:text-brand-400 font-medium transition-colors">
                Back to the player
            </a>
        </p>

    </div>

    <script>
        // Password toggle
        const toggleBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('admin-password');
        const eyeIcon = document.getElementById('eye-icon');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.innerHTML = isPassword
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                       d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                          a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242
                          M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0
                          0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                       d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                       d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                          -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
        });

        // Login form submission
        const form = document.getElementById('admin-login-form');
        const statusEl = document.getElementById('login-status');
        const loginBtn = document.getElementById('login-btn');
        const loginBtnText = document.getElementById('login-btn-text');
        const loginSpinner = document.getElementById('login-spinner');

        function setStatus(message, isError) {
            statusEl.textContent = message;
            statusEl.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${isError
                ? 'bg-red-900/40 border border-red-700/50 text-red-300'
                : 'bg-green-900/40 border border-green-700/50 text-green-300'
                }`;
            statusEl.classList.remove('hidden');
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            loginBtnText.textContent = loading ? 'Signing in…' : 'Sign In';
            loginSpinner.classList.toggle('hidden', !loading);
        }

        // Redirect if already authenticated
        (async () => {
            try {
                const res = await fetch(`${window.API_BASE || ''}/api/auth/status`);
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = '/admin-upload.html';
                }
            } catch (_) { }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;

            if (!username || !password) {
                setStatus('Please enter both username and password.', true);
                return;
            }

            setLoading(true);
            statusEl.classList.add('hidden');

            try {
                const response = await fetch(`${window.API_BASE || ''}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                });
                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.error || 'Login failed. Check your credentials.', true);
                    return;
                }

                setStatus('Login successful! Redirecting…', false);
                setTimeout(() => {
                    window.location.href = '/admin-upload.html';
                }, 800);
            } catch (err) {
                setStatus(`Network error: ${err.message}`, true);
            } finally {
                setLoading(false);
            }
        });
    </script>

</body>

</html>
